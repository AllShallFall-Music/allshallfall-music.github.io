<script>

        const startBtn = document.getElementById('startBtn');
        const back = document.querySelectorAll('.card-back');   /* Rückseite der Karte. Es wird ein Array erstellt, da es mehrere Karten gibt. Alle Elemente mit der Klasse "card-back" werden ausgewählt. */
        const front = document.querySelectorAll('.card-front'); /*Bildseite der Karte*/
        const reset = document.getElementById('resetBtn');

        const container = document.querySelector('.karten');    /*Erstellt einen Array aus den Kindern des Containers. Das sind die Karten, die gemischt werden sollen.*/
        const mixedcards = Array.from(container.children);

        const aufdecken = document.querySelectorAll('.drehbox');   

                function shuffle(array) {                               /*1.Funktion definieren. Karten werden gemischt */

                        for (let i = array.length - 1; i > 0; i--) {

                        const j = Math.floor(Math.random() * (i + 1));
                        [array[i], array[j]] = [array[j], array[i]];

                        }
                }

                        startBtn.addEventListener('click', () => {

                            shuffle(mixedcards);  
                                                                                  /* 2.Funktion aufrufen, damit die Karten gemischt werden. Es wird der Array übergeben, der die Karten enthält. */
                                mixedcards.forEach(drehbox => {
                                    container.appendChild(drehbox);                                 /* 3.Karten werden in der neuen Reihenfolge dem Container hinzugefügt. Dadurch werden sie auf der Seite in der neuen Reihenfolge angezeigt. */
                                back.forEach(rueckseite => rueckseite.style.display = "block");   /* 4. Alle Rückseiten der Karten werden sichtbar gemacht, damit der Spieler die Karten sehen kann. */
                                
                                }
                                                  );
                        }
                                                 )
        let erstekarte = null;   /* Variable, um die erste aufgedeckte Karte zu speichern. Anfangs ist sie null, da noch keine Karte aufgedeckt wurde. */
        let zweitekarte = null;
        let sperre = false;        /* Variable, um zu verhindern, dass während des Vergleichs weitere Karten aufgedeckt werden können. Anfangs ist sie false, da keine Karten verglichen werden. */


                                aufdecken.forEach(karte => {
                                        karte.addEventListener('click', () => {
                                        

                                            if(sperre) return;  /* Wenn sperre true ist, wird die Funktion verlassen und es können keine weiteren Karten aufgedeckt werden. */

                                            const rueckseite = karte.querySelector('.card-back');
                                            rueckseite.style.display = "none";

                                            if(!erstekarte) {
                                                erstekarte = karte;  /* Wenn erstekarte null ist, wird die aktuelle Karte als erstekarte gespeichert. */
                                                return;
                                            }

                                            zweitekarte = karte;
                                            sperre = true;

                                            vergleichen();
                                });
                            });

                        function vergleichen() {

                            const bild1 = erstekarte.querySelector('img').src;  /* Es wird die Bildquelle der ersten Karte ausgelesen und in bild1 gespeichert. */
                            const bild2 = zweitekarte.querySelector('img').src;  /* Es wird die Bildquelle der zweiten Karte ausgelesen und in bild2 gespeichert. */

                                if(bild1 === bild2) {

                                    erstekarte = null;   /* Wenn die Bilder gleich sind, werden die Variablen zurückgesetzt, damit der Spieler die nächsten Karten aufdecken kann. */
                                    zweitekarte = null;
                                    sperre = false;
                                }

                                else {
                                        setTimeout(() => {

                                        erstekarte.querySelector('.card-back').style.display = "block";
                                        zweitekarte.querySelector('.card-back').style.display = "block";

                                        erstekarte = null;
                                        zweitekarte = null;
                                        sperre = false;
                                        }, 1000); /* Wenn die Bilder nicht gleich sind, werden die Karten nach einer kurzen Verzögerung wieder umgedreht. Die Variablen werden zurückgesetzt, damit der Spieler die nächsten Karten aufdecken kann. */
                                }
                        }

</script>
