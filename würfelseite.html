<script>

                const dicesymbols = [                                           //Bestimmung von Konstanten für die Bilder der Würfelseiten
                                        "Würfelseiten/Dice1.png",
                                        "Würfelseiten/Dice2.png",   
                                        "Würfelseiten/Dice3.png",
                                        "Würfelseiten/Dice4.png",
                                        "Würfelseiten/Dice5.png",
                                        "Würfelseiten/Dice6.png"
                                    ];

                       /*FORMEL und Begrenzung auf 3 MAL würfeln */  
                                    
                                    function rollDice()  {                                                                        //Funtion definieren
                                    let results = [];                                                                             // Lasst ein leeres Array für die Ergebnisse erstellen


                                    { for (let i = 1; i <= 3; i++)                                                                  //Lass drei mal würfeln (i=1,2,3)


                                    {
                                        
                                    let number = Math.floor(Math.random() * 6) + 1;                                                         //Zahl generieren, gerundet (1-6)
                                    
                                    results.push(number);                                                                            // Ergebnis soll in Array gespeichert werden


                                    document.getElementById(`dice${i}`).textContent =  number ;    // Zahlen werden in Text ausgegeben bei Dice1, Dice2 und Dice3
                                    

                                    document.getElementById(`diceimg${i}`).src = dicesymbols [number -1 ];  
                                    
                                    document.getElementById("message").textContent = "Du hast gewürfelt "; 
                                    }



                                    console.log("Ergebnisse dieses Wurfs:", results);                                                   //Hier werden die Ergebnisse in der Konsole ausgegeben (nur zur Überprüfung)
                                

                                /*Prüfen, ob alle drei Würfel eine 6 zeigen*/
                                           /* if (results[0] === results[1] && results[1] === results[2])*/ 
                                             if (results.every(num => num === 6))
                                                                                            // Animation anzeigen

                                                                                    
                                                                                           { const anim = document.getElementById("FreshMeat");
                                                                                            anim.style.display = "block";

                                                                                            // Optional: nach 5 Sekunden wieder ausblenden
                                                                                            setTimeout(() => {
                                                                                                anim.style.display = "none";
                                                                                            }, 5000);

                                                                                            // Ton abspielen (wenn vorhanden)
                                                                                            const audio = new Audio("Ahhh_fresh_meat!.mp3");
                                                                                            audio.play();
                                                                                        }
                                                                                    }
                                                                                }
                                                                                    
                        
            </script>
