<!DOCTYPE html>
<html>
<head>
  <title>Mini Klaviatur</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f0f0;
    }
    .klavier {
      position: relative;
      display: flex;
      width: 280px;
    }

    .white {
      width: 40px;
      height: 150px;
      border: 1px solid black;
      background: white;
      cursor: pointer;
      
    }

    .black {
      position: absolute;
      width: 25px;
      height: 90px;
      background: black;
      color: white;
      top: 0;
      z-index: 2;
      cursor: pointer;
    }
  </style>
</head>
<body>

    <div class="klavier">
        <!-- Weiße Tasten -->
        <div class="white" onclick="play('C4')"></div>
        <div class="white" onclick="play('D4')"></div>
        <div class="white" onclick="play('E4')"></div>
        <div class="white" onclick="play('F4')"></div>
        <div class="white" onclick="play('G4')"></div>
        <div class="white" onclick="play('A4')"></div>
        <div class="white" onclick="play('B4')"></div>

        <!-- Schwarze Tasten -->
        <div class="black" style="left:30px" onclick="play('C#4')"></div>
        <div class="black" style="left:70px" onclick="play('D#4')"></div>
        <div class="black" style="left:150px" onclick="play('F#4')"></div>
        <div class="black" style="left:190px" onclick="play('G#4')"></div>
        <div class="black" style="left:230px" onclick="play('A#4')"></div>
    </div>

    <script src="https://unpkg.com/tone"></script>

    <script>
        const synth = new Tone.Synth().toDestination();

        async function play(note) {
        await Tone.start();
        synth.triggerAttackRelease(note, "8n");
        }

        const notes = ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4'];

    </script>

</body>
</html>
