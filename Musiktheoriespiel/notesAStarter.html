<!DOCTYPE html>
<html lang="de">
            
         <head>
            <meta charset="UTF-8">
            <title>MusicTheory with AllShallFall First official site. Music an more!</title>
            <link rel="stylesheet" href="notesEasy.css">
            <script src="https://unpkg.com/tone"></script>
            <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>        
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <link rel="icon" type="image/jpg"  href="../Bilder/Favicon_Nr.2.jpg">
         </head>

     <body>
        <header>
            <h1>Music Theory. The Game 🎹</h1>
        </header>


            <div class="Aufgabe">
                <button style="box-shadow: 0 0 20px rgba(35, 214, 59, 0.5);" onclick="neueAufgabe()">Gib mir noch eine Note </button>
                    <label>
                    <input type="checkbox" id="autoNext" />
                      <span title="Wenn aktiviert, wird nach einer richtigen Antwort automatisch eine neue Note erzeugt.">ℹ️
                    </span>
                    </label>
                  
                <p class="Abfrage" id="Notenabfrage">&nbsp;</p> <!-- Zu spielende Note -->
                <p class="counter" id="streakCounter">Aktuelle Serie: 0 richtige Antworten in Folge</p>

                 <!-- VexFlow Musical Staff -->
                <div class="Notesystem">
                    <div id="boo"></div>
                </div>
                
                <div class="klavier" id="userInput">
                    <!-- Weiße Tasten -->
                    <div class="white" onclick="handleClick(this,'C4')"></div>
                    <div class="white" onclick="handleClick(this,'D4')"></div>
                    <div class="white" onclick="handleClick(this,'E4')"></div>
                    <div class="white" onclick="handleClick(this,'F4')"></div>
                    <div class="white" onclick="handleClick(this,'G4')"></div>
                    <div class="white" onclick="handleClick(this,'A4')"></div>
                    <div class="white" onclick="handleClick(this,'B4')"></div>

                    <!-- Schwarze Tasten -->
                    <div class="black" style="left:27px" onclick="handleClick(this,'C#4')"></div>
                    <div class="black" style="left:67px" onclick="handleClick(this,'D#4')"></div>
                    <div class="black" style="left:147px" onclick="handleClick(this,'F#4')"></div>
                    <div class="black" style="left:187px" onclick="handleClick(this,'G#4')"></div>
                    <div class="black" style="left:227px" onclick="handleClick(this,'A#4')"></div>
                </div>
            </div>


        <footer>
                <p>Copyright © 2026 AllShallFall. Alle Rechte vorbehalten.</p>
        </footer>
        <script src="notesAStarter.js"></script>
     </body>


</html>
