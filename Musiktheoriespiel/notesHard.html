     <body>
        <header>
            <h1>Music Theory. The Game 🎹</h1>

            <div class="Aufgabe">
            
                <button onclick="neueAufgabe()">Gib mir eine Note</button>

                    <input type="checkbox" id="autoNext" />

                </label>

                
                
                <p class="counter" id="streakCounter">Aktuelle Serie: 0 richtige Antworten in Folge</p>

                <div class="Notesystem hard">
                    <div id="boo"></div>
                    <p id="Notenabfrage">Viel Spaß.</p> <!-- Zu spielende Note -->
                </div>
                

                <div class="klavier" id="userInput">                 
                    <!-- Weiße Tasten -->
                    <div class="white" onclick="handleClick(this, 'C2')"></div>
                    <div class="white" onclick="handleClick(this, 'D2')"></div>
                    <div class="white" onclick="handleClick(this, 'E2')"></div>
